# ============================================================
# 可复用 Workflow — 被其他 Workflow 调用
# ============================================================
# 学习重点：
#   - on: workflow_call: 声明此 workflow 可被复用
#   - inputs: 调用方传入的参数（有类型、默认值）
#   - outputs: 调用完成后向调用方返回的数据
#   - secrets: inherit — 继承调用方的 Secrets（推荐方式）
#
# ── 使用方式 ──────────────────────────────────────────────
# 其他 Workflow 用 uses: ./.github/workflows/reusable-test.yml 调用
# ============================================================

name: "Reusable — Run Tests"

on:
  workflow_call:
    # ── 输入参数（调用方可自定义）─────────────────────────
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "20"
      run-coverage:
        description: "Whether to generate coverage report"
        type: boolean
        default: false

    # ── 输出（供调用方读取）──────────────────────────────
    outputs:
      test-result:
        description: "Test result: passed or failed"
        value: ${{ jobs.run-tests.outputs.result }}

jobs:
  run-tests:
    name: "Test (Node ${{ inputs.node-version }})"
    runs-on: ubuntu-latest

    outputs:
      result: ${{ steps.set-result.outputs.result }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run with coverage
        if: inputs.run-coverage
        run: npm run test:coverage

      - name: Upload coverage (if generated)
        if: inputs.run-coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-from-reusable
          path: coverage/
          retention-days: 3

      - name: Set output result
        id: set-result
        run: echo "result=passed" >> $GITHUB_OUTPUT
