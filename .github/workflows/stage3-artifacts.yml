# ============================================================
# 阶段三：构建产物 — Cache vs Artifact、Job 间数据传递
# ============================================================
# 学习重点：
#   - Cache：跨 Workflow run 复用文件（加速依赖安装）
#     key = hashFiles('package-lock.json') — lock 文件变化时自动失效
#   - Artifact：保存 Workflow run 产生的文件（供下载/后续 Job 使用）
#   - $GITHUB_OUTPUT：Job 间传递变量的推荐方式
#
# ── Cache vs Artifact 的本质区别 ────────────────────────
# Cache    → 加速构建，存储依赖/编译缓存，run 之间共享
# Artifact → 存档产出物，run 内 Job 之间或供人工下载
# ============================================================

name: "Stage 3 — Artifacts & Cache"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: 运行测试 + 生成覆盖率报告 ─────────────────────
  test-with-coverage:
    name: "Test & Generate Coverage"
    runs-on: ubuntu-latest

    outputs:
      # 通过 $GITHUB_OUTPUT 将覆盖率摘要传给下一个 Job
      coverage-summary: ${{ steps.coverage.outputs.summary }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"   # ← 关键！内置 npm 缓存，key 自动用 package-lock.json hash

      # cache: 'npm' 等价于手动配置以下步骤（此处注释展示原理）:
      # - uses: actions/cache@v4
      #   with:
      #     path: ~/.npm
      #     key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
      #     restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # 读取覆盖率摘要并写入 GITHUB_OUTPUT
      - name: Extract coverage summary
        id: coverage
        run: |
          SUMMARY=$(cat coverage/coverage-summary.json | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            const json = JSON.parse(data).total;
            console.log('Lines: ' + json.lines.pct + '% | Statements: ' + json.statements.pct + '% | Functions: ' + json.functions.pct + '%');
          ")
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT
          echo "Coverage: ${SUMMARY}"

      # 上传覆盖率报告为 Artifact（保留 7 天，可在 Actions 页面下载）
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 2: 下载 Artifact 并展示摘要 ─────────────────────
  show-coverage:
    name: "Show Coverage Summary"
    runs-on: ubuntu-latest
    needs: test-with-coverage

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: downloaded-coverage/

      - name: Display coverage summary from previous job output
        run: |
          echo "📊 Coverage Summary (from Job output):"
          echo "${{ needs.test-with-coverage.outputs.coverage-summary }}"

      - name: Display downloaded coverage files
        run: |
          echo ""
          echo "📁 Downloaded Artifact contents:"
          ls -la downloaded-coverage/
          echo ""
          echo "📄 coverage-summary.json:"
          cat downloaded-coverage/coverage-summary.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).total;
            console.log('  Lines:      ' + d.lines.pct + '%');
            console.log('  Statements: ' + d.statements.pct + '%');
            console.log('  Functions:  ' + d.functions.pct + '%');
            console.log('  Branches:   ' + d.branches.pct + '%');
          "
