# ============================================================
# 阶段四（生产级）：完整 CI/CD 流水线
# ============================================================
# 新增概念：
#   - concurrency: 同分支新 push 自动取消旧的排队 run
#   - permissions: 最小权限原则，只声明必要的权限
#   - PR 与 merge 流程分离：PR 只跑 CI，merge 才部署
# ============================================================

name: "Stage 4 — CI/CD Pipeline (Production-grade)"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── 并发控制 ──────────────────────────────────────────────
# 同一分支/PR 上如果有新 push，自动取消正在排队（非运行中）的旧 run
# 防止多次快速 push 导致 workflow 堆积
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── 最小权限声明 ───────────────────────────────────────────
# 默认关闭所有权限，按需开启
# 防止 workflow 被注入恶意代码后拥有过高权限
permissions:
  contents: read # 只需要读代码，不需要写

jobs:
  # ── Job 1: 代码检查（PR 和 push 都跑）────────────────────
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-project # ← Composite Action 封装了 checkout + setup + npm ci
      - run: npm run lint

  # ── Job 2: 测试（PR 和 push 都跑）────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-project # ← 同一个 Action 直接复用
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 3: 部署到 Staging（仅 push 到 main）──────────────
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    needs: [lint, test]
    environment: staging

    # PR 不部署，只有真正合并到 main 才部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "🚀 Deploying commit ${{ github.sha }} to staging..."
          echo ""
          # 真实项目中这里是:
          #   fly deploy --app myapp-staging
          #   railway up --service staging
          #   kubectl set image deployment/app app=myimage:${{ github.sha }}
          echo "✅ Staging deployment complete"
          echo "   URL: https://staging.example.com"

      - name: Write deployment summary
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://staging.example.com |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: 部署到 Production（需人工审批）────────────────
  deploy-production:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production # Required reviewers 在此生效

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "🚀 Deploying commit ${{ github.sha }} to production..."
          echo ""
          # 真实项目中这里是:
          #   fly deploy --app myapp-prod
          echo "✅ Production deployment complete"
          echo "   URL: https://www.example.com"

      - name: Write deployment summary
        run: |
          echo "## 🎉 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://www.example.com |" >> $GITHUB_STEP_SUMMARY
