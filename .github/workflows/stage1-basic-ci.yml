# ============================================================
# 阶段一：基础 CI — 理解 Workflow 骨架
# ============================================================
# 学习重点：
#   - on: 触发事件（push / pull_request）
#   - jobs: 定义一个或多个 Job
#   - steps: Job 内的执行步骤
#   - uses: 使用社区 Action（如 actions/checkout）
#   - run: 执行 shell 命令
# ============================================================

name: "Stage 1 — Basic CI"

# ── 触发条件 ──────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

# ── Job 定义 ──────────────────────────────────────────────
jobs:
  ci:
    name: "Install & Test"
    runs-on: ubuntu-latest   # GitHub 托管的 Runner（免费）

    steps:
      # Step 1: 拉取代码到 Runner
      - name: Checkout code
        uses: actions/checkout@v4
        # 等价于: git clone + cd，Runner 工作目录变为你的仓库根目录

      # Step 2: 安装指定版本的 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache: 'npm'   ← 阶段三才加，先理解无 cache 的基本流程

      # Step 3: 安装依赖
      - name: Install dependencies
        run: npm ci
        # npm ci 比 npm install 更适合 CI：严格按 package-lock.json 安装，速度更快

      # Step 4: 运行测试
      - name: Run tests
        run: npm test
